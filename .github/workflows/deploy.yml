name: CI/CD

on:
  push:
    branches: [ "develop" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15.5
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.2

      - name: Build
        run: go build -o main ./cmd

      - name: Wait for Postgres
        run: sleep 5

      - name: Run Migration
        run: ./main migrate up
        env:
          DB_URL: postgres://test:test@localhost:5432/test?sslmode=disable

      - name: Run Tests
        run: go test ./...