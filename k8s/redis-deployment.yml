apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7.2

          command:
            - sh
            - -c
            - redis-server --requirepass "$REDIS_PASSWORD"

          ports:
            - containerPort: 6379

          envFrom:
            - secretRef:
                name: eth-backend-secret